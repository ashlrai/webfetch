<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orangeGlow" cx="0.1" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#ff5a1f" stop-opacity="0.32"/>
      <stop offset="50%" stop-color="#ff5a1f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stampInk" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#d63a2f" fill-opacity="0.06"/>
      <circle cx="1.5" cy="1.5" r="0.7" fill="#d63a2f" fill-opacity="0.45"/>
    </pattern>
    <pattern id="stampInkGreen" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#2a5a3a" fill-opacity="0.08"/>
      <circle cx="1.5" cy="1.5" r="0.7" fill="#4ade80" fill-opacity="0.55"/>
    </pattern>
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="#0a0a0c"/>
  <rect width="1200" height="630" fill="url(#orangeGlow)"/>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Wordmark -->
  <g transform="translate(72,72)">
    <rect width="22" height="22" rx="4" fill="#ff5a1f"/>
    <rect x="6" y="6" width="10" height="10" rx="2" fill="#0a0a0c"/>
    <text x="36" y="19" fill="#f0f0f2"
          font-family="Geist Mono, ui-monospace, Menlo, monospace"
          font-size="20" font-weight="600" letter-spacing="-0.02em">webfetch</text>
  </g>

  <!-- Hero wordmark (mono) -->
  <text x="72" y="332" fill="#f0f0f2"
        font-family="Geist Mono, ui-monospace, Menlo, monospace"
        font-size="148" font-weight="600" letter-spacing="-0.06em">webfetch<tspan fill="#ff5a1f">.</tspan></text>

  <!-- Tagline -->
  <text x="72" y="396" fill="#c5c5cc"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="28" font-weight="400" letter-spacing="-0.01em">
    The license-first image layer for AI agents and humans.
  </text>
  <text x="72" y="430" fill="#8a8a95"
        font-family="Geist Mono, ui-monospace, Menlo, monospace"
        font-size="15" letter-spacing="0.04em">
    24 providers · federated · attribution-first · MCP-native
  </text>

  <!-- Stamp grid (right side) -->
  <g transform="translate(770,90)">
    <!-- CC0 stamp -->
    <g transform="translate(20,20) rotate(-7)">
      <rect width="150" height="68" fill="url(#stampInkGreen)" stroke="#4ade80" stroke-width="2.5" rx="4"/>
      <text x="75" y="32" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="22" font-weight="700" fill="#4ade80" letter-spacing="0.12em">CC0</text>
      <text x="75" y="52" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="9" font-weight="600" fill="#4ade80" letter-spacing="0.18em">PUBLIC USE</text>
    </g>
    <!-- PUBLIC DOMAIN -->
    <g transform="translate(200,40) rotate(5)">
      <rect width="180" height="74" fill="url(#stampInkGreen)" stroke="#6ea87a" stroke-width="2.5" rx="4"/>
      <text x="90" y="34" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="14" font-weight="700" fill="#6ea87a" letter-spacing="0.12em">PUBLIC</text>
      <text x="90" y="54" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="14" font-weight="700" fill="#6ea87a" letter-spacing="0.12em">DOMAIN</text>
    </g>
    <!-- CC-BY -->
    <g transform="translate(40,150) rotate(-3)">
      <rect width="170" height="68" fill="url(#stampInk)" stroke="#d63a2f" stroke-width="2.5" rx="4"/>
      <text x="85" y="32" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="22" font-weight="700" fill="#d63a2f" letter-spacing="0.12em">CC-BY</text>
      <text x="85" y="52" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="9" font-weight="600" fill="#d63a2f" letter-spacing="0.18em">ATTRIBUTION REQ</text>
    </g>
    <!-- EDITORIAL -->
    <g transform="translate(230,170) rotate(8)">
      <rect width="170" height="68" fill="url(#stampInk)" stroke="#d63a2f" stroke-width="2.5" rx="4"/>
      <text x="85" y="32" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="18" font-weight="700" fill="#d63a2f" letter-spacing="0.12em">EDITORIAL</text>
      <text x="85" y="52" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="9" font-weight="600" fill="#d63a2f" letter-spacing="0.18em">LICENSED USE</text>
    </g>
    <!-- UNKNOWN rejected -->
    <g transform="translate(80,290) rotate(-12)" opacity="0.55">
      <rect width="180" height="68" fill="none" stroke="#f87171" stroke-width="2.5" rx="4" stroke-dasharray="6 3"/>
      <text x="90" y="32" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="20" font-weight="700" fill="#f87171" letter-spacing="0.12em">UNKNOWN</text>
      <text x="90" y="52" text-anchor="middle"
            font-family="Geist Mono, ui-monospace, Menlo, monospace"
            font-size="9" font-weight="600" fill="#f87171" letter-spacing="0.18em">REJECTED BY DEFAULT</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <line x1="72" y1="540" x2="1128" y2="540" stroke="#2a2a30" stroke-width="1"/>

  <g transform="translate(72,560)">
    <text x="0" y="22" fill="#f0f0f2"
          font-family="Geist Mono, ui-monospace, Menlo, monospace"
          font-size="16" font-weight="500" letter-spacing="0.04em">
      MIT  ·  24 providers  ·  241 tests
    </text>
  </g>

  <g transform="translate(900,560)">
    <circle cx="6" cy="16" r="5" fill="#ff5a1f"/>
    <text x="20" y="22" fill="#c5c5cc"
          font-family="Geist Mono, ui-monospace, Menlo, monospace"
          font-size="16" font-weight="500" letter-spacing="0.04em">
      getwebfetch.com
    </text>
  </g>
</svg>
