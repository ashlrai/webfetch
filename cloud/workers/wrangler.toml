# Cloudflare Workers configuration for webfetch Cloud.
#
# Routes: api.getwebfetch.com/*  (bind at deploy time via dashboard or account-level
# routes). This file declares bindings only.

name = "webfetch-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# Bundle @webfetch/core from source so we avoid the node-targeted dist
# bundle (which uses createRequire(import.meta.url) and breaks Workers
# even with nodejs_compat).
[alias]
"@webfetch/core" = "../../packages/core/src/index.ts"
"@webfetch/core/providers" = "../../packages/core/src/providers/index.ts"
"@webfetch/core/hints" = "../../packages/core/src/hints/index.ts"

# -----------------------------------------------------------------------------
# D1 — primary SQL store for users, workspaces, keys, usage_rows, audit_log.
# -----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "webfetch-prod"
database_id = "10bbdca4-2d70-4ccb-8b1c-e25f1a37b141"
migrations_dir = "../schema"

# -----------------------------------------------------------------------------
# KV namespaces.
#   KEYS      — API-key hash -> { workspaceId, apiKeyId } for sub-ms bearer lookup
#   RATELIMIT — transient counter store (token buckets) keyed by workspace+minute
#   QUOTA     — daily/monthly counters keyed by workspace+window
# -----------------------------------------------------------------------------
[[kv_namespaces]]
binding = "KEYS"
id = "51a9a403b4f649d8a9b0bfc0a209db0d"

[[kv_namespaces]]
binding = "RATELIMIT"
id = "d1bd61e50d094197a86ea4994fa69d4c"

[[kv_namespaces]]
binding = "QUOTA"
id = "ddbde78fe4ad4f8d94c078f7950928d0"

# -----------------------------------------------------------------------------
# R2 — cached download blobs keyed by sha256. 30-day lifecycle rule applied via
# the R2 dashboard.
# -----------------------------------------------------------------------------
[[r2_buckets]]
binding = "CACHE"
bucket_name = "webfetch-cache"

# -----------------------------------------------------------------------------
# Queue — async usage metering. Producers = route handlers. Consumer = the same
# worker, invoked by Cloudflare with a batched message payload.
# -----------------------------------------------------------------------------
[[queues.producers]]
binding = "USAGE"
queue = "webfetch-usage"

[[queues.consumers]]
queue = "webfetch-usage"
max_batch_size = 100
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "webfetch-usage-dlq"

# -----------------------------------------------------------------------------
# Durable Objects — per-API-key rate limiter (token-bucket implementation in
# src/middleware.ts).
# -----------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "RL_DO"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

# -----------------------------------------------------------------------------
# Cron triggers — daily audit log retention sweep at 03:00 UTC. Pre-cutoff
# rows are streamed to R2 (CACHE) under audit-archive/<date>/<workspace>.ndjson
# and removed from D1. Implemented in src/cron/audit-retention.ts.
# -----------------------------------------------------------------------------
[triggers]
crons = ["0 3 * * *"]

# -----------------------------------------------------------------------------
# Environment variables (non-secrets). Secrets set via `wrangler secret put`:
#   Required:
#     STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, BETTER_AUTH_SECRET, SENDGRID_API_KEY
#   OAuth providers (optional, enables social signin):
#     GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
#   Pro+ pooled provider keys (optional, enables platform pool for paid plans):
#     PLATFORM_SERPAPI_KEY, PLATFORM_UNSPLASH_ACCESS_KEY, PLATFORM_PEXELS_API_KEY,
#     PLATFORM_PIXABAY_API_KEY, PLATFORM_BRAVE_API_KEY, PLATFORM_BING_API_KEY,
#     PLATFORM_SPOTIFY_CLIENT_ID, PLATFORM_SPOTIFY_CLIENT_SECRET,
#     PLATFORM_FLICKR_API_KEY, PLATFORM_SMITHSONIAN_API_KEY, PLATFORM_EUROPEANA_API_KEY
#   Bright Data managed-browser fallback (Pro/Team feature; gated to pooled plans):
#     BRIGHTDATA_API_TOKEN, BRIGHTDATA_ZONE (optional, defaults "web_unlocker")
# -----------------------------------------------------------------------------
[vars]
APP_URL = "https://app.getwebfetch.com"
API_URL = "https://api.getwebfetch.com"
ENVIRONMENT = "production"
STRIPE_PRICE_PRO = "price_1TSOL2IsCo7Z3L3vc01zRWlF"
STRIPE_PRICE_TEAM = "price_1TSOL3IsCo7Z3L3vy3wjKMxW"
STRIPE_PRICE_TEAM_SEAT = "price_1TSOL3IsCo7Z3L3vtmahRgyd"
STRIPE_PRICE_OVERAGE_PRO = "price_1TSOL2IsCo7Z3L3vDwWOAQCj"
STRIPE_PRICE_OVERAGE_TEAM = "price_1TSOL3IsCo7Z3L3va7qd6VOV"
# Customer Portal — Evero LLC LIVE mode. Includes Pro/Team plan switching,
# customer update, payment method update, invoice history, and
# at-period-end cancellation with reason capture. Bound to webfetch
# products prod_URGspK7LvA6aHD (Pro) and prod_URGs1uXTJ6kzQe (Team).
STRIPE_PORTAL_CONFIG_ID = "bpc_1TSOLoIsCo7Z3L3v91IP14fL"

[env.development.vars]
APP_URL = "http://localhost:3000"
API_URL = "http://localhost:8787"
ENVIRONMENT = "development"
