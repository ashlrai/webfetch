name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build + publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint green subset
        run: bun run lint:ci

      - name: Test
        run: bun test

      - name: Verify dashboard
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build
        working-directory: cloud/dashboard

      - name: Verify landing
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build
        working-directory: cloud/landing

      - name: Verify browser extension
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build
        working-directory: extension

      - name: Verify VS Code extension
        run: |
          npm ci
          npm run compile
        working-directory: vscode-extension

      - name: Verify Python SDK
        run: |
          python -m pip install -e packages/sdk-python pytest pytest-asyncio respx
          python -m pytest packages/sdk-python/tests

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync package versions from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for pkg in core cli mcp server browser; do
            PKG="$pkg" node -e "const fs=require('node:fs');const pkg=process.env.PKG;const version=process.env.VERSION;const p='packages/'+pkg+'/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=version;if(j.dependencies?.['@webfetch/core'])j.dependencies['@webfetch/core']=version;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          done

      - name: Build packages
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/cli build
          bun run --cwd packages/mcp build
          bun run --cwd packages/server build
          bun run --cwd packages/browser build

      - name: Smoke built Node artifacts
        run: |
          node packages/cli/dist/index.js help
          node packages/server/dist/index.js --help
          node -e "const m=await import('./packages/core/dist/index.js'); if (typeof m.searchImages !== 'function') throw new Error('core import failed');"
          node -e "const m=await import('./packages/browser/dist/index.js'); if (typeof m.createBrowserProvider !== 'function') throw new Error('browser import failed');"
          test "$(head -n 1 packages/cli/dist/index.js)" = "#!/usr/bin/env node"
          test "$(head -n 1 packages/mcp/dist/index.js)" = "#!/usr/bin/env node"
          test "$(head -n 1 packages/server/dist/index.js)" = "#!/usr/bin/env node"

      - name: Publish @webfetch/core
        run: npm publish --access public --provenance
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @webfetch/cli
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @webfetch/mcp
        run: npm publish --access public --provenance
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @webfetch/server
        run: npm publish --access public --provenance
        working-directory: packages/server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @webfetch/browser
        run: npm publish --access public --provenance
        working-directory: packages/browser
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release + attach built artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release-artifacts
          for pkg in core cli mcp server browser; do
            tar -czf "release-artifacts/webfetch-${pkg}-${VERSION}.tgz" -C "packages/${pkg}" dist package.json README.md LICENSE 2>/dev/null || \
              tar -czf "release-artifacts/webfetch-${pkg}-${VERSION}.tgz" -C "packages/${pkg}" dist package.json LICENSE
          done
          gh release create "v${VERSION}" release-artifacts/*.tgz \
            --title "webfetch v${VERSION}" \
            --generate-notes

  homebrew-bump:
    name: Bump homebrew-webfetch tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump formula in ashlrai/homebrew-webfetch
        # Opens (or updates) a PR on the tap repo bumping `Formula/webfetch.rb`
        # to point at the freshly published @webfetch/cli tarball on npm.
        # Requires HOMEBREW_GH_TOKEN (fine-scoped PAT, contents:write on
        # ashlrai/homebrew-webfetch).
        uses: mislav/bump-homebrew-formula-action@v3
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_GH_TOKEN }}
        with:
          formula-name: webfetch
          formula-path: Formula/webfetch.rb
          homebrew-tap: ashlrai/homebrew-webfetch
          base-branch: main
          download-url: https://registry.npmjs.org/@webfetch/cli/-/cli-${{ steps.version.outputs.version }}.tgz
          commit-message: |
            bump webfetch to ${{ steps.version.outputs.version }}

            Released via .github/workflows/release.yml on ashlrai/webfetch.
