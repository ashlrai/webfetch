name: example-image-enrichment

# Example: enrich a content site at build time by fetching license-safe
# images for each of a list of queries, committing the result back to the
# repo. Runs on demand via workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Search query"
        required: true
        default: "Drake musician portrait"
      out-dir:
        description: "Output directory relative to repo root"
        required: true
        default: "assets/portraits"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch images
        id: webfetch
        uses: ./integrations/github-action
        with:
          query: ${{ inputs.query }}
          out-dir: ${{ inputs.out-dir }}
          license: safe-only
          max-per-provider: 3
          limit: 6
          min-width: 1200
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

      - name: Summarize
        run: |
          echo "Downloaded ${{ steps.webfetch.outputs.count }} images."
          echo "Manifest: ${{ steps.webfetch.outputs.manifest }}"
          ls -la "${{ inputs.out-dir }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.out-dir }}"
          if ! git diff --cached --quiet; then
            git commit -m "chore: enrich ${{ inputs.out-dir }} for '${{ inputs.query }}'"
            git push
          else
            echo "no changes to commit"
          fi
