[tool.poetry]
name = "webfetch"
version = "0.1.0"
description = "The license-first image layer for AI agents and humans - Python SDK."
authors = ["Mason Wyatt <mason@ashlr.ai>"]
license = "MIT"
readme = "README.md"
homepage = "https://getwebfetch.com"
repository = "https://github.com/ashlrai/webfetch"
keywords = ["image-search", "licensing", "ai", "mcp", "agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
packages = [{ include = "webfetch" }]

[tool.poetry.dependencies]
python = "^3.10"
httpx = "^0.27"
pydantic = "^2.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = "^0.23"
respx = "^0.21"

[tool.poetry.scripts]
webfetch = "webfetch.cli:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
